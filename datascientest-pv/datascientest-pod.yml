apiVersion: v1
kind: Pod
metadata:
  name: pod-datascientest
  labels:
    app: nginx
spec:
  containers:
    - name: nginx
      image: nginx
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - name: datascientest-volume
          mountPath: /usr/share/nginx/html/
      ports:
        - containerPort: 80
  tolerations:
    - key: "node.kubernetes.io/disk-pressure"
      operator: "Exists"
      effect: "NoSchedule"
  volumes:
    - name: datascientest-volume
      persistentVolumeClaim:
        claimName: pvc-datascientest
