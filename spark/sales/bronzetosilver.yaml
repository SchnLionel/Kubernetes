apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: bronze-to-silver
  namespace: sales
spec:
  type: Scala
  mode: cluster
  image: schnlionel/sales-bronzetosilver:latest
  imagePullPolicy: IfNotPresent
  mainClass: BronzeToSilver
  mainApplicationFile: local:///opt/spark/jars/bronze_to_silver.jar
  sparkVersion: 3.5.2
  driver:
    cores: 1
    memory: "512m"
    labels:
      version: 3.5.2
    serviceAccount: spark-operator-spark
  executor:
    cores: 1
    instances: 1
    memory: "512m"
    labels:
      version: 3.5.2
